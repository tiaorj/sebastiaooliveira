{% extends 'base.html' %}

{% block content %}
<main class="content-scroll p-5">
    <h2 class="display-4 fw-bold text-uppercase mb-5">Habilidades <span class="text-primary-custom">Técnicas</span></h2>

    <div class="row">
        {% for hab in habilidades %}
        <div class="col-md-6 mb-4">
            <div class="d-flex justify-content-between mb-1">
                <span class="fw-bold text-uppercase text-secondary" style="font-size: 0.9rem;">{{ hab.categoria }}</span>
                <span class="text-primary-custom fw-bold" style="font-size: 0.8rem;">Expert</span>
            </div>
            
            <div class="progress" style="height: 6px; background-color: #e9ecef;">
                <div class="progress-bar" role="progressbar" 
                     style="width: 95%; background-color: var(--directi-blue);" 
                     aria-valuenow="95" aria-valuemin="0" aria-valuemax="100">
                </div>
            </div>
            
            <p class="mt-2 text-muted small">{{ hab.itens }}</p>
        </div>
        {% endfor %}
    </div>
</main>
{% endblock %}
