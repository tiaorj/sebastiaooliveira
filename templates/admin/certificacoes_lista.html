{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-uppercase">Gestão de <span class="text-primary-custom">Certificações</span></h2>
        <a href="{{ url_for('certificacoes_admin.form') }}" class="btn btn-primary-custom fw-bold">+ NOVA CERTIFICAÇÃO</a>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ICONE</th>
                    <th>NOME / INSTITUIÇÃO</th>
                    <th class="text-center">AÇÕES</th>
                </tr>
            </thead>
            <tbody>
                {% for c in certificados %}
                <tr>
                    <td style="width: 80px;"><i class="bi {{ c.IconeClass }} fs-3 text-primary-custom"></i></td>
                    <td>
                        <div class="fw-bold">{{ c.Nome }}</div>
                        <small class="text-muted text-uppercase">{{ c.Instituicao }}</small>
                    </td>
                    <td class="text-center">
                        <a href="{{ url_for('certificacoes_admin.form', id=c.CertificacaoId) }}" class="btn btn-sm btn-outline-primary border-0">
                            <i class="bi bi-pencil-fill"></i>
                        </a>
                        <a href="{{ url_for('certificacoes_admin.excluir', id=c.CertificacaoId) }}" 
                           class="btn btn-sm btn-outline-danger border-0"
                           onclick="return confirm('Deseja remover esta certificação?')">
                            <i class="bi bi-trash-fill"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
