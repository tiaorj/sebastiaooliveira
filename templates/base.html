<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Sebastião Oliveira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <span style="color: #ffffff;">DIRECT</span><span style="color: #ff8c00;">I</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-building"></i> Empresa</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="/sobre"><i class="bi bi-person-badge"></i> Especialista</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="/projetos"><i class="bi bi-code-slash"></i> Projetos</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="/contato"><i class="bi bi-envelope"></i> Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white text-center py-4 mt-5 border-top">
        <p class="text-muted mb-0">&copy; 2026 - Sebastião Oliveira | Analista de Sistemas Sênior</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
