<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <nav class="col-md-3 col-lg-2 d-none d-md-block shadow-sm" id="sidebar-fixa">
            <div class="text-center pt-5">
                <div class="mb-4">
                    <img src="{{ url_for('static', filename='img/minha-foto.jpg') }}" 
                         class="img-fluid rounded-circle border border-4 border-white-50 shadow" 
                         style="width: 150px; height: 150px; object-fit: cover;">
                </div>
                <h3 class="text-white h5 mb-5 fw-bold text-uppercase px-2">Sebastião Oliveira</h3>
                <ul class="nav flex-column fw-bold text-uppercase">
                    <li class="nav-item"><a class="nav-link text-white-50" href="/">Empresa</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="/sobre">Currículo</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="/projetos">Projetos</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="/contato">Contato</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 content-scroll">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
