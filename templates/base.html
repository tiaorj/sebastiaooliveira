<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ INFO_BASE.nome }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700,800" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark navbar-mobile d-md-none sticky-top shadow">
        <div class="container-fluid">
            
            <a class="navbar-brand fw-bold" href="/">DIRECTI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMobile">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navMobile">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Empresa</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sobre">Currí­culo</a></li>
                    <li class="nav-item"><a class="nav-link" href="/projetos">Projetos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contato">Contato</a></li>
                    <li class="nav-item"><a class="nav-link" href="/Formacao">Formação</a></li>
                    <li class="nav-item"><a class="nav-link" href="/Habilidades">Habilidades</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="sidebar-wrapper" class="text-center">
        <div class="pt-5 px-3">
            <img src="{{ url_for('static', filename='img/minha-foto.jpg') }}" class="img-fluid rounded-circle border border-4 border-white-50 mb-3 shadow" style="width: 160px; height: 160px; object-fit: cover;">
            <h3 class="text-white h5 fw-bold text-uppercase mb-5">{{ INFO_BASE.get('especialista', 'Nome não definido') }}</h3>
        
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="/">Empresa</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('curriculo.sobre') }}">Especialista/Currí­culo</a></li>
                <li class="nav-item"><a class="nav-link" href="/projetos">Projetos</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('empresa.contato') }}">Contato</a></li>

                <li class="nav-item"><a class="nav-link" href="{{ url_for('curriculo.formacao') }}">Formação</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('curriculo.habilidades') }}">Habilidades</a></li>
               
<li class="nav-item ms-lg-3">
        <a class="text-white-50 hover-white" href="{{ url_for('admin.login') }}" title="Área Administrativa">
            <i class="bi bi-person-lock fs-5"></i>
        </a>
    </li>                
            </ul>
        </div>
    </div>

    <main class="content-scroll">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
