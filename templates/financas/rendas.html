{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <!-- FORMULÁRIO DE ENTRADA -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white fw-bold">
                    <i class="bi bi-graph-up-arrow me-2"></i>Nova Renda
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <input type="text" name="descricao" class="form-control" placeholder="Ex: Pro-labore" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor Previsto</label>
                            <input type="text" name="valor_previsto" class="form-control" placeholder="0,00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor Real Recebido</label>
                            <input type="text" name="valor_real" class="form-control" placeholder="0,00">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Data do Recebimento</label>
                            <input type="date" name="data_recebimento" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">SALVAR RENDA</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- LISTAGEM DO MÊS -->
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Entradas do Mês</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <h5 class="fw-bold">Entradas de {{ mes }}/{{ ano }}</h5>
                        <div>
                            <a href="?mes={{ mes-1 if mes > 1 else 12 }}&ano={{ ano if mes > 1 else ano-1 }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-chevron-left"></i></a>
                            <a href="?mes={{ mes+1 if mes < 12 else 1 }}&ano={{ ano if mes < 12 else ano+1 }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-chevron-right"></i></a>
                        </div>
                    </div>                    
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Descrição</th>
                                <th class="text-end">Previsto</th>
                                <th class="text-end">Real</th>
                                <th>Data</th>
                            </tr>
                        </thead>
                        <tbody>
                        {% for r in rendas %}
                        <tr id="linha-renda-{{ r.RendaId }}">
                            <td>
                                <span id="desc-text-{{ r.RendaId }}">{{ r.Descricao }}</span>
                                <input type="text" id="desc-edit-{{ r.RendaId }}" class="form-control form-control-sm d-none" value="{{ r.Descricao }}">
                            </td>
                            <td class="text-end">
                                <span id="prev-text-{{ r.RendaId }}">R$ {{ "{:,.2f}".format(r.ValorPrevisto) }}</span>
                                <input type="text" id="prev-edit-{{ r.RendaId }}" class="form-control form-control-sm d-none text-end" value="{{ "{:.2f}".format(r.ValorPrevisto) }}">
                            </td>
                            <td class="text-end fw-bold text-success">
                                <span id="real-text-{{ r.RendaId }}">R$ {{ "{:,.2f}".format(r.ValorReal) }}</span>
                                <input type="text" id="real-edit-{{ r.RendaId }}" class="form-control form-control-sm d-none text-end" value="{{ "{:.2f}".format(r.ValorReal) }}">
                            </td>
                            <td class="text-center">
                                <!-- Botões de Ação -->
                                <div id="acoes-padrao-{{ r.RendaId }}">
                                    <button class="btn btn-sm btn-outline-primary border-0" onclick="iniciarEdicaoRenda({{ r.RendaId }})">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger border-0" onclick="deletarRenda({{ r.RendaId }})">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                                <!-- Botões de Salvar (Ocultos) -->
                                <div id="acoes-edicao-{{ r.RendaId }}" class="d-none">
                                    <button class="btn btn-sm btn-success" onclick="salvarEdicaoRenda({{ r.RendaId }})">
                                        <i class="bi bi-check-lg"></i>
                                    </button>
                                    <button class="btn btn-sm btn-secondary" onclick="cancelarEdicaoRenda({{ r.RendaId }})">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // GARANTA QUE ESTA FUNÇÃO ESTEJA AQUI DENTRO
    function iniciarEdicaoRenda(id) {
        console.log("Iniciando edição para o ID:", id); // Log para debug no F12
        document.getElementById(`desc-text-${id}`).classList.add('d-none');
        document.getElementById(`desc-edit-${id}`).classList.remove('d-none');
        document.getElementById(`prev-text-${id}`).classList.add('d-none');
        document.getElementById(`prev-edit-${id}`).classList.remove('d-none');
        document.getElementById(`real-text-${id}`).classList.add('d-none');
        document.getElementById(`real-edit-${id}`).classList.remove('d-none');
        
        document.getElementById(`acoes-padrao-${id}`).classList.add('d-none');
        document.getElementById(`acoes-edicao-${id}`).classList.remove('d-none');
    }

    function salvarEdicaoRenda(id) {
        const payload = {
            descricao: document.getElementById(`desc-edit-${id}`).value,
            valor_previsto: document.getElementById(`prev-edit-${id}`).value,
            valor_real: document.getElementById(`real-edit-${id}`).value
        };

        fetch(`/financas/editar-renda/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) location.reload();
            else alert("Erro ao salvar: " + data.message);
        });
    }

    function cancelarEdicaoRenda(id) {
        location.reload();
    }

    function deletarRenda(id) {
        if (!confirm("Tem certeza que deseja excluir esta renda?")) return;
        fetch(`/financas/deletar-renda/${id}`, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if (data.success) document.getElementById(`linha-renda-${id}`).remove();
        });
    }
</script>
{% endblock %}
