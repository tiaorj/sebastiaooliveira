{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <h2 class="fw-bold text-center mb-5 text-uppercase">Meu <span class="text-primary">Portfólio</span></h2>
    
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for p in projetos %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0 card-portfolio border-left-primary">
                <div class="card-body p-4">
                    <!-- Ícone e Título -->
                    <div class="icon-shape bg-primary bg-opacity-10 text-primary">
                        <i class="{{ p.IconeClass if p.IconeClass else 'bi bi-code-slash' }} fs-2"></i>
                    </div>
                    
                    <h5 class="fw-bold mb-2">{{ p.Titulo }}</h5>
                    <p class="text-muted small mb-4" style="height: 60px; overflow: hidden;">
                        {{ p.Descricao }}
                    </p>

                    <!-- Tags de Tecnologia -->
                    <div class="mb-4">
                        {% for tech in p.Tecnologias|split_techs %}
                            <span class="tech-tag">{{ tech }}</span>
                        {% endfor %}
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="card-footer bg-transparent border-0 p-4 pt-0">
                    <div class="d-flex gap-2">
                        {% if p.LinkGitHub %}
                            <a href="{{ p.LinkGitHub }}" target="_blank" class="btn btn-outline-dark btn-sm w-100 fw-bold">
                                <i class="bi bi-github me-1"></i> CODE
                            </a>
                        {% endif %}
                        {% if p.LinkLive %}
                            <a href="{{ p.LinkLive }}" target="_blank" class="btn btn-primary btn-sm w-100 fw-bold">
                                <i class="bi bi-eye me-1"></i> DEMO
                            </a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>>
</div>
{% endblock %}
