{% extends 'base.html' %}
{% block title %}Projetos{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-5 fw-bold">Destaques do Portfólio</h2>
    <div class="row g-4">
        {% for p in projetos %}
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center">
                    <div class="display-4 text-primary mb-3">
                        <i class="bi {{ p.icone }}"></i>
                    </div>
                    <h5 class="card-title fw-bold">{{ p.titulo }}</h5>
                    <p class="card-text text-muted small">{{ p.descricao }}</p>
                </div>
                <div class="card-footer bg-transparent border-0 pb-3">
                    <small class="text-primary fw-bold">{{ p.tecnologias }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
