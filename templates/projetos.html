{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <h2 class="fw-bold text-center mb-5 text-uppercase">Meu <span class="text-primary">Portfólio</span></h2>
    
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for p in projetos %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center mb-3">
                        <i class="{{ p.IconeClass if p.IconeClass else 'bi bi-code-slash' }} fs-3 text-primary me-2"></i>
                        <h5 class="card-title fw-bold mb-0">{{ p.Titulo }}</h5>
                    </div>
                    <p class="card-text text-muted small">{{ p.Descricao }}</p>
                    <div class="mt-3">
                        {% for tech in p.Tecnologias|split_techs %}
                            <span class="badge bg-light text-dark border me-1">{{ tech }}</span>
                        {% endfor %}
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 p-4 pt-0 d-flex gap-2">
                    {% if p.LinkGitHub %}<a href="{{ p.LinkGitHub }}" class="btn btn-sm btn-dark w-100">GitHub</a>{% endif %}
                    {% if p.LinkLive %}<a href="{{ p.LinkLive }}" class="btn btn-sm btn-primary w-100">Live</a>{% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
